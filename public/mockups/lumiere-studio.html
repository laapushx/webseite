<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumière Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #F7F5F2; --dark: #141210; --accent: #B8956A; --muted: #8C8072; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); overflow-x: hidden; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 32px 64px;
  }
  .logo {
    font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 400;
    letter-spacing: 0.08em;
  }
  .logo sup { font-size: 0.5em; vertical-align: super; color: var(--accent); }
  .nav-links { display: flex; gap: 44px; font-size: 0.78rem; letter-spacing: 0.08em; color: var(--muted); }
  .nav-book {
    font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase;
    border-bottom: 1px solid var(--dark); padding-bottom: 2px; cursor: pointer;
    background: none; border-top: none; border-left: none; border-right: none;
  }

  .hero {
    display: grid; grid-template-columns: 5fr 4fr; min-height: 82vh; position: relative;
  }
  .hero-img {
    background: linear-gradient(160deg, #2A2320 0%, #3D3028 50%, #1E1A17 100%);
    position: relative; overflow: hidden;
  }
  .hero-img::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to right, transparent 60%, var(--bg) 100%);
  }
  .film-grain {
    position: absolute; inset: 0; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .lens-flare {
    position: absolute; top: 20%; left: 30%; width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(184,149,106,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero-right {
    padding: 80px 64px 80px 40px; display: flex; flex-direction: column; justify-content: center;
  }
  .eyebrow {
    font-size: 0.65rem; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 32px;
  }
  h1 {
    font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 4.5vw, 4.5rem);
    font-weight: 400; line-height: 1.12; letter-spacing: -0.01em; margin-bottom: 28px;
  }
  h1 em { font-style: italic; }
  .sub { font-size: 0.92rem; line-height: 1.8; color: var(--muted); margin-bottom: 44px; }
  .cta { display: flex; flex-direction: column; gap: 16px; }
  .btn-main {
    background: var(--dark); color: var(--bg); padding: 15px 32px;
    font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase;
    border: none; cursor: pointer; text-align: center;
  }
  .btn-sec {
    font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); text-align: center; cursor: pointer; background: none; border: none;
  }
  .divider { width: 32px; height: 1px; background: var(--accent); margin: 32px 0; }
  .stats { display: flex; gap: 40px; }
  .stat p { font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .stat strong { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; }

  .hero-tag {
    position: absolute; bottom: 40px; left: 40px;
    font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.3); writing-mode: vertical-rl; transform: rotate(180deg);
    z-index: 2;
  }
</style>
</head>
<body>
<nav>
  <div class="logo">LUMIÈRE<sup>®</sup></div>
  <div class="nav-links">
    <span>Portfolio</span>
    <span>Services</span>
    <span>Über uns</span>
  </div>
  <button class="nav-book">Session buchen</button>
</nav>

<section class="hero">
  <div class="hero-img">
    <div class="film-grain"></div>
    <div class="lens-flare"></div>
    <div class="hero-tag">Photography · Film · Dubai</div>
  </div>
  <div class="hero-right">
    <div class="eyebrow">Premium Visual Storytelling</div>
    <h1>Bilder,<br>die <em>bleiben.</em></h1>
    <p class="sub">Wir schaffen visuelle Welten für Brands, die mehr als Aufmerksamkeit wollen — die Erinnerung.</p>

    <div class="cta">
      <button class="btn-main">Portfolio ansehen</button>
      <button class="btn-sec">Projekt anfragen →</button>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat"><p>Projekte</p><strong>340+</strong></div>
      <div class="stat"><p>Jahre</p><strong>8</strong></div>
      <div class="stat"><p>Länder</p><strong>12</strong></div>
    </div>
  </div>
</section>
</body>
</html>
